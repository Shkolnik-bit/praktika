<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>СкладПро — Дашборд</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../view/styles/root.css" />
	</head>
	<body>
		<div class="layout">
			<!-- ── SIDEBAR ── -->
			<aside class="sidebar">
				<div class="brand">
					<div class="brand-icon">📦</div>
					<div class="brand-name">СкладПро</div>
				</div>

				<div class="nav-group-label">Обзор</div>
				<a class="nav-item active" data-page="dashboard">
					<span class="icon">📊</span> Дашборд
				</a>

				<div class="nav-group-label">Торговля</div>
				<a class="nav-item" data-page="sales">
					<span class="icon">🛒</span> Продажи
				</a>
				<a class="nav-item" data-page="goods">
					<span class="icon">📦</span> Товары
				</a>
				<a class="nav-item" data-page="contractors">
					<span class="icon">🏢</span> Контрагенты
				</a>
				<a class="nav-item" data-page="reports">
					<span class="icon">📑</span> Отчёты Excel
				</a>

				<div class="sidebar-footer">
					<div class="user-row">
						<div class="avatar" id="user-avatar">АИ</div>
						<div>
							<div class="user-name" id="user-name">Загрузка...</div>
							<div class="user-role">Менеджер</div>
						</div>
						<button class="logout-btn" id="logoutBtn" title="Выйти">↩</button>
					</div>
				</div>
			</aside>

			<!-- ── MAIN ── -->
			<main class="main dashboard-main">
				<!-- Topbar -->
				<div class="topbar dashboard-topbar">
					<div>
						<h1>Дашборд</h1>
						<div class="topbar-date" id="today-date"></div>
					</div>
				</div>

				<!-- KPI карточки -->
				<div class="dashboard-kpi">
					<div class="kpi-card">
						<div class="kpi-label">Общая прибыль</div>
						<div class="kpi-val" id="kpi-revenue">—</div>
						<div class="kpi-sub up">из продаж</div>
					</div>
					<div class="kpi-card">
						<div class="kpi-label">Всего продано</div>
						<div class="kpi-val" id="kpi-count">—</div>
						<div class="kpi-sub up">товаров продано</div>
					</div>
					<div class="kpi-card">
						<div class="kpi-label">Топ контрагент</div>
						<div class="kpi-val kpi-val--md" id="kpi-top">—</div>
						<div class="kpi-sub" id="kpi-top-sub">по прибыли</div>
					</div>
				</div>

				<!-- Графики -->
				<div class="dashboard-charts">
					<!-- Линейный график прибыли -->
					<div class="card">
						<div class="card-title">Динамика прибыли</div>
						<div id="bar-chart-wrap" class="chart-wrap">
							<div class="bar-empty">⏳ Загрузка...</div>
						</div>
					</div>

					<!-- Донат-диаграмма контрагентов -->
					<div class="card">
						<div class="card-title">Доля заказов</div>
						<div class="donut-wrap">
							<div class="donut-center">
								<svg
									class="donut-svg"
									viewBox="0 0 100 100"
									id="donut-svg"
									xmlns="http://www.w3.org/2000/svg"
								>
									<circle
										cx="50"
										cy="50"
										r="38"
										fill="none"
										stroke="#E8EAF6"
										stroke-width="12"
									/>
								</svg>
								<div class="donut-label">
									<div class="val" id="donut-val">—</div>
									<div class="lbl">товаров</div>
								</div>
							</div>
							<div class="legend" id="donut-legend">
								<div class="chart-loading">⏳ Загрузка...</div>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>

		<!-- Единственная точка входа JS -->
		<script type="module" src="../viewmodels/main.js"></script>
	</body>
</html>
