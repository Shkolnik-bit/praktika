<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>СкладПро — Контрагенты</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../view/styles/root.css" />
	</head>
	<body class="page-body">
		<!-- TOPBAR -->
		<div class="topbar">
			<div class="topbar-left">
				<a class="btn-back" href="index.html">← Главная</a>
				<div>
					<h1>Контрагенты</h1>
					<div class="topbar-date" id="contractors-date"></div>
				</div>
			</div>
			<div class="topbar-actions">
				<button class="btn btn-primary" id="addBtn">+ Добавить</button>
			</div>
		</div>

		<!-- KPI -->
		<div class="kpi-grid kpi-grid-2">
			<div class="kpi-card">
				<div class="kpi-label">Всего контрагентов</div>
				<div class="kpi-val" id="kpi-total">—</div>
				<div class="kpi-sub">активных партнёров</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Топ контрагент</div>
				<div class="kpi-val kpi-val--md" id="kpi-top">—</div>
				<div class="kpi-sub">по прибыли</div>
			</div>
		</div>

		<!-- ТАБЛИЦА -->
		<div class="card">
			<div class="card-title">
				Детализация
				<div class="table-toolbar">
					<input
						class="search-input"
						id="searchInput"
						type="text"
						placeholder="🔍  Поиск..."
					/>
					<span class="badge badge-blue" id="count-badge">0 контрагентов</span>
				</div>
			</div>
			<table>
				<thead>
					<tr>
						<th style="width: 36px">#</th>
						<th>Контрагент</th>
						<th>Email</th>
						<th>Телефон</th>
						<th>Продано товаров</th>
						<th>Прибыль</th>
						<th></th>
					</tr>
				</thead>
				<tbody id="contractors-tbody"></tbody>
			</table>
		</div>

		<!-- МОДАЛКА: ДОБАВИТЬ / РЕДАКТИРОВАТЬ -->
		<div class="modal-overlay" id="contractorModal">
			<div class="modal">
				<div class="modal-header">
					<div class="modal-title" id="modal-title">➕ Новый контрагент</div>
					<button class="modal-close" id="modalClose">✕</button>
				</div>
				<div class="modal-field">
					<label>Название / ФИО</label>
					<input type="text" id="m-name" />
				</div>
				<div class="modal-field">
					<label>Email</label>
					<input type="email" id="m-email" />
				</div>
				<div class="modal-field">
					<label>Телефон</label>
					<input type="tel" id="m-phone" />
				</div>
				<div class="modal-footer">
					<button class="btn btn-outline" id="modalCancel">Отмена</button>
					<button class="btn btn-primary" id="modalSave">Сохранить</button>
				</div>
			</div>
		</div>

		<!-- МОДАЛКА: УДАЛИТЬ -->
		<div class="modal-overlay" id="confirmModal">
			<div class="confirm-modal">
				<h3>🗑 Удалить контрагента?</h3>
				<p id="confirm-text">Это действие нельзя отменить.</p>
				<div class="confirm-actions">
					<button class="btn btn-outline" id="confirmCancel">Отмена</button>
					<button class="btn-danger" id="confirmDelete">Удалить</button>
				</div>
			</div>
		</div>

		<script type="module" src="/viewmodels/contractors.js"></script>
	</body>
</html>
