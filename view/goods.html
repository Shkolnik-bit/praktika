<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>СкладПро — Товары</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../view/styles/root.css" />
	</head>
	<body class="page-body">
		<!-- TOPBAR -->
		<div class="topbar">
			<div class="topbar-left">
				<a class="btn-back" href="index.html">← Главная</a>
				<div>
					<h1>Товары</h1>
					<div class="topbar-date" id="goods-date"></div>
				</div>
			</div>
			<div class="topbar-actions">
				<button class="btn btn-outline" id="resetBtn">↺ Сбросить</button>
				<button class="btn btn-primary" id="addBtn">+ Добавить товар</button>
			</div>
		</div>

		<!-- KPI -->
		<div class="kpi-grid kpi-grid-3">
			<div class="kpi-card">
				<div class="kpi-label">Всего товаров</div>
				<div class="kpi-val" id="kpi-total">—</div>
				<div class="kpi-sub">в каталоге</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Общая стоимость</div>
				<div class="kpi-val" id="kpi-sum">—</div>
				<div class="kpi-sub">▲ +5%</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Средняя цена</div>
				<div class="kpi-val" id="kpi-avg">—</div>
				<div class="kpi-sub">за единицу</div>
			</div>
		</div>

		<!-- ТАБЛИЦА -->
		<div class="card">
			<div class="card-title">
				Каталог товаров
				<div class="table-toolbar">
					<input
						class="search-input"
						id="searchInput"
						type="text"
						placeholder="🔍  Поиск..."
					/>
					<select class="filter-select" id="contractorFilter">
						<option value="">Все поставщики</option>
					</select>
					<select class="filter-select" id="sortSelect">
						<option value="name">По названию</option>
						<option value="price-desc">Цена ↓</option>
						<option value="price-asc">Цена ↑</option>
						<option value="date-desc">Дата ↓</option>
					</select>
					<span class="badge badge-blue" id="count-badge">0 товаров</span>
				</div>
			</div>

			<table>
				<thead>
					<tr>
						<th style="width: 36px">#</th>
						<th>Название</th>
						<th>Поставщик</th>
						<th>Дата</th>
						<th>Цена</th>
					</tr>
				</thead>
				<tbody id="goods-tbody"></tbody>
			</table>
		</div>

		<!-- МОДАЛЬНОЕ ОКНО: Добавить товар -->
		<div class="modal-overlay" id="goodModal">
			<div class="modal">
				<div class="modal-header">
					<div class="modal-title">➕ Новый товар</div>
					<button class="modal-close" id="modalClose">✕</button>
				</div>
				<div class="modal-field">
					<label>Название товара</label>
					<input type="text" id="m-name" />
				</div>
				<div class="modal-field">
					<label>Поставщик</label>
					<input type="text" id="m-contractor" />
				</div>
				<div class="modal-field">
					<label>Цена (₽)</label>
					<input type="number" id="m-price" min="0" />
				</div>
				<div class="modal-field">
					<label>Дата поступления</label>
					<input type="date" id="m-date" />
				</div>
				<div class="modal-footer">
					<button class="btn btn-outline" id="modalCancel">Отмена</button>
					<button class="btn btn-primary" id="modalSave">Сохранить</button>
				</div>
			</div>
		</div>

		<script type="module" src="/viewmodels/goods.js"></script>
	</body>
</html>
