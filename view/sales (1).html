<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>СкладПро — Продажи</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../view/styles/root.css" />
	</head>
	<body class="page-body">
		<!-- TOPBAR -->
		<div class="topbar">
			<div class="topbar-left">
				<a class="btn-back" href="index.html">← Главная</a>
				<div>
					<h1>Продажи</h1>
					<div class="topbar-date" id="sales-date"></div>
				</div>
			</div>
			<div class="topbar-actions">
				<button class="btn btn-outline" id="resetBtn">↺ Сбросить</button>
				<button class="btn btn-outline" id="exportBtn">⬇ Экспорт Excel</button>
				<button class="btn btn-primary" id="addSaleBtn">
					+ Добавить продажу
				</button>
			</div>
		</div>

		<!-- KPI -->
		<div class="kpi-grid">
			<div class="kpi-card">
				<div class="kpi-label">Всего продаж</div>
				<div class="kpi-val" id="kpi-total">—</div>
				<div class="kpi-sub">▲ +12% к прошлому месяцу</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Общая выручка</div>
				<div class="kpi-val" id="kpi-revenue">—</div>
				<div class="kpi-sub">▲ +21%</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Средний чек</div>
				<div class="kpi-val" id="kpi-avg">—</div>
				<div class="kpi-sub">▲ +8%</div>
			</div>
			<div class="kpi-card">
				<div class="kpi-label">Средний рейтинг</div>
				<div class="kpi-val" id="kpi-rating">—</div>
				<div class="kpi-sub">из 5 ★</div>
			</div>
		</div>

		<!-- ФИЛЬТРЫ -->
		<div class="card">
			<div class="card-title">Фильтры</div>
			<div class="filters">
				<div>
					<label class="field-label-sm" for="f-contractor">Контрагент</label>
					<select id="f-contractor">
						<option value="">Все</option>
					</select>
				</div>
				<div>
					<label class="field-label-sm" for="f-from">Дата от</label>
					<input type="date" id="f-from" />
				</div>
				<div>
					<label class="field-label-sm" for="f-to">Дата до</label>
					<input type="date" id="f-to" />
				</div>
				<div>
					<button class="btn btn-primary" id="applyBtn" style="width: 100%">
						Применить
					</button>
				</div>
			</div>
		</div>

		<!-- ТАБЛИЦА -->
		<div class="card">
			<div class="card-title">
				Список продаж
				<span class="badge badge-blue" id="count-badge">0 записей</span>
			</div>
			<table>
				<thead>
					<tr>
						<th>#</th>
						<th>Товар</th>
						<th>Контрагент</th>
						<th>Дата</th>
						<th>Рейтинг</th>
						<th>Цена</th>
					</tr>
				</thead>
				<tbody id="sales-tbody"></tbody>
			</table>
		</div>

		<!-- МОДАЛЬНОЕ ОКНО: Добавить продажу -->
		<div class="modal-overlay" id="saleModal">
			<div class="modal">
				<div class="modal-header">
					<div class="modal-title">➕ Новая продажа</div>
					<button class="modal-close" id="modalClose">✕</button>
				</div>
				<div class="modal-field">
					<label>Название товара</label>
					<input type="text" id="m-name" />
				</div>
				<div class="modal-field">
					<label>Контрагент</label>
					<input type="text" id="m-contractor" />
				</div>
				<div class="modal-field">
					<label>Цена (₽)</label>
					<input type="number" id="m-price" min="0" />
				</div>
				<div class="modal-field">
					<label>Рейтинг</label>
					<select id="m-rating">
						<option value="5">★★★★★ — 5</option>
						<option value="4">★★★★☆ — 4</option>
						<option value="3">★★★☆☆ — 3</option>
						<option value="2">★★☆☆☆ — 2</option>
						<option value="1">★☆☆☆☆ — 1</option>
					</select>
				</div>
				<div class="modal-field">
					<label>Дата продажи</label>
					<input type="date" id="m-date" />
				</div>
				<div class="modal-footer">
					<button class="btn btn-outline" id="modalCancel">Отмена</button>
					<button class="btn btn-primary" id="modalSave">Сохранить</button>
				</div>
			</div>
		</div>

		<script type="module" src="/viewmodels/sales.js"></script>
	</body>
</html>
