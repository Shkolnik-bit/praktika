<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>СкладПро — Отчёты Excel</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../view/styles/root.css" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
	</head>
	<body class="page-body">
		<!-- TOPBAR -->
		<div class="topbar">
			<div class="topbar-left">
				<a class="btn-back" href="index.html">← Главная</a>
				<div>
					<h1>Отчёты Excel</h1>
					<div class="topbar-date" id="page-date"></div>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="card-title">📤 Экспорт отчёта</div>

			<div class="field-group">
				<label class="field-label-sm" for="r-contractor">Контрагент</label>
				<select id="r-contractor">
					<option value="">Все контрагенты</option>
				</select>
			</div>

			<div class="field-group">
				<label class="field-label-sm" for="r-sort">Сортировка отчёта</label>
				<select id="r-sort">
					<option value="profit">По прибыли (убыванию)</option>
					<option value="qty">По количеству проданных товаров</option>
					<option value="date">По дате (новые первые)</option>
				</select>
			</div>

			<div class="field-group">
				<label class="checkbox-label">
					<input type="checkbox" id="r-group" />
					Группировать одинаковые товары (суммировать кол-во и прибыль)
				</label>
			</div>

			<div class="field-group">
				<label class="field-label-sm">Период</label>
				<div class="date-row">
					<input type="date" id="r-from" />
					<input type="date" id="r-to" />
				</div>
			</div>

			<div class="field-group">
				<label class="field-label-sm" for="r-filename">Имя файла</label>
				<input
					type="text"
					id="r-filename"
					value="report.xlsx"
					placeholder="report.xlsx"
				/>
			</div>

			<button class="btn btn-primary btn-full" id="exportBtn">
				⬇ Скачать отчёт Excel
			</button>
			<div class="export-result" id="export-result"></div>

			<!-- ПРЕДПРОСМОТР -->
			<div class="excel-preview-wrap">
				<div class="excel-preview-header">
					<div>📊 Предпросмотр данных</div>
					<div class="row-count" id="preview-row-count">загрузка...</div>
				</div>
				<div class="excel-table-scroll">
					<table class="excel-table">
						<thead>
							<tr>
								<th class="col-letter" style="min-width: 32px"></th>
								<th class="col-letter">A</th>
								<th class="col-letter">B</th>
								<th class="col-letter">C</th>
								<th class="col-letter">D</th>
								<th class="col-letter">E</th>
								<th class="col-letter">F</th>
								<th class="col-letter">G</th>
								<th class="col-letter">H</th>
							</tr>
						</thead>
						<tbody id="excel-tbody"></tbody>
					</table>
				</div>
			</div>
		</div>

		<script type="module" src="../viewmodels/reports.js"></script>
	</body>
</html>
