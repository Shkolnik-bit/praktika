<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Авторизация — СкладПро</title>
		<link rel="stylesheet" href="../view/styles/root.css" />
	</head>
	<body>
		<div class="auth-layout">
			<!-- Левая панель -->
			<div class="auth-panel-left">
				<div class="auth-brand">
					<div class="auth-brand-icon">📦</div>
					<div class="auth-brand-name">СкладПро</div>
				</div>
				<div class="auth-hero">
					<h1>Облачная ERP<br />для вашего бизнеса</h1>
					<p>Продажи, закупки, учёт, финансы и отчёты — всё в одной системе</p>
				</div>
			</div>

			<!-- Правая панель -->
			<div class="auth-panel-right">
				<div class="auth-card">
					<h2 id="formTitle">С возвращением!</h2>
					<p class="subtitle" id="formSubtitle">Войдите в свой аккаунт</p>

					<form id="authForm">
						<div class="field-group">
							<label for="email">Email</label>
							<input
								type="email"
								id="email"
								placeholder="you@company.ru"
								required
							/>
						</div>
						<div class="field-group">
							<label for="password">Пароль</label>
							<input
								type="password"
								id="password"
								placeholder="••••••••"
								required
							/>
						</div>
						<button
							class="btn btn-primary btn-full"
							type="submit"
							id="submitBtn"
						>
							Войти
						</button>
					</form>

					<div class="auth-error" id="authError" style="display: none"></div>

					<div class="toggle-row">
						<span id="toggleText">Нет аккаунта?</span>
						<button type="button" id="toggleMode">Зарегистрироваться</button>
					</div>
				</div>
			</div>
		</div>

		<script type="module" src="../viewmodels/AuthViewModel.js"></script>
		<script type="module" src="../services/roleGuard.js"></script>
	</body>
</html>
